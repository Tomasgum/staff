name: Deploy Theme via FTP

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Deploy to production
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_IP }}
          username: ${{ secrets.FTP_USR }}
          password: ${{ secrets.FTP_PASS }}
          local-dir: ./
          server-dir: /wp-content/themes/Scaff Theme/
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            .github/**
